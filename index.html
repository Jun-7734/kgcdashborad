<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정관장 에브리타임 밸런스 마케팅 대시보드</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for Data Visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f9fafb; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">에브리타임 밸런스 마케팅 대시보드</h1>
                <p class="text-gray-500 text-sm">2026년 3월 4주차 전략 리포트 시각화</p>
            </div>
            <div class="flex gap-2">
                <span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-xs font-semibold">리뉴얼 제품군</span>
                <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold">전략 보고용</span>
            </div>
        </header>

        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="stats-grid">
            <!-- Stats will be injected here -->
        </div>

        <!-- Main Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Sales Trend Chart -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800">
                    <i data-lucide="map-pin" class="text-red-600 w-5 h-5"></i> 수도권 vs 지방 판매량
                </h3>
                <div class="chart-container">
                    <canvas id="salesChart"></canvas>
                </div>
                <p class="text-xs text-gray-400 mt-4 text-center">* 수도권: 편의점 채널 강세 / 지방: 대형마트 정체</p>
            </div>

            <!-- Keyword Growth Chart -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800">
                    <i data-lucide="activity" class="text-orange-600 w-5 h-5"></i> 라이프스타일 키워드 언급 추이
                </h3>
                <div class="chart-container">
                    <canvas id="keywordChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Customer Segment -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-4">구매 고객 구성 (연령)</h3>
                <div class="chart-container flex justify-center items-center">
                    <canvas id="ageChart"></canvas>
                </div>
            </div>

            <!-- Action Strategy Card -->
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold mb-6">전략적 핵심 액션 아이템</h3>
                <div class="space-y-4" id="action-items">
                    <!-- Actions will be injected here -->
                </div>
            </div>
        </div>

        <!-- Footer / Insights -->
        <div class="mt-8 p-6 bg-red-900 text-white rounded-2xl shadow-lg">
            <h4 class="text-lg font-bold mb-2 flex items-center gap-2">
                <i data-lucide="trending-up" class="w-5 h-5"></i> 팀장 Insight 요약
            </h4>
            <p class="text-red-100 text-sm opacity-90 leading-relaxed">
                "리뉴얼 제품이 2030의 라이프스타일(편의점, 아웃도어 스포츠)에 성공적으로 침투하고 있습니다. 
                이제는 브랜드 포지셔닝을 '전통적 보양'에서 '능동적 퍼포먼스 서포터'로 전환하는 마케팅 캠페인에 집중할 때입니다."
            </p>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Data for Quick Stats
        const stats = [
            { title: '수도권 판매 성장', value: '+15%', icon: 'trending-up', color: 'text-green-600', bg: 'bg-green-50' },
            { title: '핵심 타겟 비중', value: '45%', icon: 'users', color: 'text-blue-600', bg: 'bg-blue-50' },
            { title: '액티브 키워드 증가', value: '+30%', icon: 'activity', color: 'text-purple-600', bg: 'bg-purple-50' },
            { title: '지방 판매 추이', value: '-2%', icon: 'alert-triangle', color: 'text-red-600', bg: 'bg-red-50' },
        ];

        const statsGrid = document.getElementById('stats-grid');
        stats.forEach(stat => {
            statsGrid.innerHTML += `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">${stat.title}</p>
                            <h3 class="text-2xl font-bold ${stat.color}">${stat.value}</h3>
                        </div>
                        <div class="${stat.bg} p-2 rounded-lg">
                            <i data-lucide="${stat.icon}" class="${stat.color} w-5 h-5"></i>
                        </div>
                    </div>
                </div>
            `;
        });
        lucide.createIcons(); // Re-render for dynamic content

        // Sales Chart
        new Chart(document.getElementById('salesChart'), {
            type: 'bar',
            data: {
                labels: ['월', '화', '수', '목', '금', '토', '일'],
                datasets: [
                    { label: '수도권', data: [4000, 4500, 5200, 6100, 7500, 8200, 7800], backgroundColor: '#ef4444', borderRadius: 5 },
                    { label: '지방', data: [2400, 2300, 2200, 2100, 2000, 2500, 2600], backgroundColor: '#9ca3af', borderRadius: 5 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });

        // Keyword Growth Chart (Area)
        new Chart(document.getElementById('keywordChart'), {
            type: 'line',
            data: {
                labels: ['2월', '3월 1주', '3월 2주', '3월 3주', '3월 4주'],
                datasets: [
                    { 
                        label: '등산', data: [100, 110, 130, 160, 210], 
                        borderColor: '#f97316', backgroundColor: 'rgba(249, 115, 22, 0.2)', fill: true, tension: 0.4 
                    },
                    { 
                        label: '테니스', data: [80, 95, 120, 150, 195], 
                        borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.1)', fill: true, tension: 0.4 
                    }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Age Distribution Chart (Doughnut)
        new Chart(document.getElementById('ageChart'), {
            type: 'doughnut',
            data: {
                labels: ['2030 사회초년생', '40대 직장인', '50대 이상', '기타'],
                datasets: [{
                    data: [45, 25, 20, 10],
                    backgroundColor: ['#ef4444', '#f87171', '#fca5a5', '#fee2e2']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });

        // Strategy Actions
        const actions = [
            { icon: 'gift', color: 'bg-red-500', title: '편의점 채널 프로모션 최적화', desc: '사회초년생의 반복 구매 습관 형성을 위한 2+1 및 모바일 바우처 증정' },
            { icon: 'activity', color: 'bg-orange-500', title: "'Active Lifestyle' 캠페인 가동", desc: '#오운완 테니스/등산 커뮤니티 타겟 SNS 챌린지 및 인플루언서 협업' },
            { icon: 'message-circle', color: 'bg-blue-500', title: '패키지 QC 강화 및 가격 심리 방어', desc: '개봉 편의성 개선 및 대형마트용 실속형 대용량 패키지 기획' }
        ];

        const actionItems = document.getElementById('action-items');
        actions.forEach(action => {
            actionItems.innerHTML += `
                <div class="flex items-start gap-4 p-4 bg-gray-50 rounded-xl">
                    <div class="${action.color} p-2 rounded-full text-white">
                        <i data-lucide="${action.icon}" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <h4 class="font-semibold text-gray-900 text-sm">${action.title}</h4>
                        <p class="text-xs text-gray-500 mt-1">${action.desc}</p>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();
    </script>
</body>
</html>
